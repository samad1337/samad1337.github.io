<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" font-family="'JetBrains Mono', ui-monospace, monospace">
  <rect width="720" height="250" rx="10" fill="#0e110f"/>
  <text x="24" y="34" fill="#647269" font-size="12" letter-spacing="1">REFLECTED XSS — REQUEST FLOW</text>

  <!-- boxes -->
  <g stroke-width="1.5" font-size="13">
    <rect x="24"  y="90" width="130" height="64" rx="9" fill="#141714" stroke="#5fe0a0"/>
    <text x="89"  y="118" fill="#e4ebe6" text-anchor="middle">Attacker</text>
    <text x="89"  y="138" fill="#647269" text-anchor="middle" font-size="11">crafts link</text>

    <rect x="214" y="90" width="130" height="64" rx="9" fill="#141714" stroke="#f5b865"/>
    <text x="279" y="118" fill="#e4ebe6" text-anchor="middle">Victim</text>
    <text x="279" y="138" fill="#647269" text-anchor="middle" font-size="11">clicks link</text>

    <rect x="404" y="90" width="140" height="64" rx="9" fill="#141714" stroke="#5fe0a0"/>
    <text x="474" y="114" fill="#e4ebe6" text-anchor="middle">Vulnerable</text>
    <text x="474" y="132" fill="#e4ebe6" text-anchor="middle">site</text>

    <rect x="600" y="90" width="96" height="64" rx="9" fill="#141714" stroke="#ff6b6b"/>
    <text x="648" y="118" fill="#ff6b6b" text-anchor="middle">Script</text>
    <text x="648" y="138" fill="#647269" text-anchor="middle" font-size="11">runs</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#97a69d"/>
    </marker>
  </defs>
  <g stroke="#97a69d" stroke-width="1.5" marker-end="url(#a)">
    <line x1="154" y1="122" x2="206" y2="122"/>
    <line x1="344" y1="122" x2="396" y2="122"/>
    <line x1="544" y1="122" x2="592" y2="122"/>
  </g>
  <g fill="#647269" font-size="10.5" text-anchor="middle">
    <text x="180" y="112">sends</text>
    <text x="370" y="112">reflects</text>
    <text x="568" y="112">in browser</text>
  </g>

  <text x="24" y="206" fill="#97a69d" font-size="12">Unescaped input is echoed back into the page and</text>
  <text x="24" y="224" fill="#97a69d" font-size="12">executed in the victim's session.</text>
</svg>
